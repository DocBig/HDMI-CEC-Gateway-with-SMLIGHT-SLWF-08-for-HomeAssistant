          - type: markdown
            content: '## 🔌 HDMI Input'
          - type: horizontal-stack
            cards:
              - type: button
                name: HDMI 1
                icon: mdi:numeric-1-box
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
