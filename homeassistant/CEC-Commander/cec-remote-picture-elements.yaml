      - type: markdown
        content: |
          ---
          ### 🔧 Diagnostics & Bus Monitor
      - type: vertical-stack
        cards:
          - type: markdown
            content: '## 🔍 CEC Device Scan'
          - type: conditional
            conditions:
              - condition: state
                entity: input_text.cec_scan_status
                state_not: Scan abgeschlossen
              - condition: state
                entity: input_text.cec_scan_status
                state_not: ''
            card:
              type: markdown
              content: |
                ⏳ **Scan in progress – please do not send commands!**
          - type: horizontal-stack
            cards:
              - type: button
                name: Start Scan
                icon: mdi:magnify-scan
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.cec_scan_start
              - type: entity
                entity: input_text.cec_scan_status
                name: Status
          - type: markdown
            content: >
              {% set results = states('input_text.cec_scan_results') %}

              {% if results not in ('unknown', '') %}

              | Addr | Physical | Type |

              |------|----------|------|

              {% for line in results.split('\n') %}

              {% set parts = line.split(' | ') %}

              | {{ parts[0] | replace('Addr ', '') }} | {{ parts[1] if
              parts|length > 1 else '?' }} | {{ parts[2] if parts|length > 2
              else '?' }} |

              {% endfor %}

              {% else %}

              *No scan performed yet*

              {% endif %}
          - type: markdown
            content: |
              <details><summary>Address Reference</summary>

              | Addr | Type |
              |------|------|
              | 0 | TV |
              | 1–2 | Recording |
              | 3 | Tuner 1 |
              | 4 | Playback 1 (Gateway) |
              | 5 | Audio System |
              | 6–7 | Tuner 2–3 |
              | 8 | Playback 2 |
              | 9 | Recording 3 |
              | 10–14 | Other devices |

              </details>
      - type: vertical-stack
        cards:
          - type: markdown
            content: '## 📋 CEC Log'
          - type: entities
            entities:
              - entity: sensor.hdmi_cec_gateway_4dbde0_cec_raw
                name: Raw
              - entity: sensor.hdmi_cec_gateway_4dbde0_cec_readable
                name: Readable
              - entity: input_boolean.cec_bus_log_enabled
                name: Show Bus Log
                toggle: true
          - type: conditional
            conditions:
              - entity: input_boolean.cec_bus_log_enabled
                state: 'on'
            card:
              type: logbook
              title: CEC Bus Log (last hour)
              entities:
                - sensor.hdmi_cec_gateway_4dbde0_cec_readable
              hours_to_show: 1
    type: masonry
