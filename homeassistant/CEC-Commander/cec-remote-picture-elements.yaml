title: CEC Remote Control
views:
  - title: CEC Control
    icon: mdi:television-remote
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: '## ⏻ Power'
          - type: horizontal-stack
            cards:
              - type: button
                name: Turn on TV
                icon: mdi:television-play
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.cec_tv_on
              - type: button
                name: All Standby
                icon: mdi:power-sleep
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.cec_standby_all
      - type: vertical-stack
        cards:
          - type: markdown
            content: '## 📺 TV Model'
          - type: entity
            entity: input_select.cec_tv_model
            name: Select TV Model
      - type: vertical-stack
        cards:
          - type: markdown
            content: '## 🔊 Volume'
          - type: horizontal-stack
            cards:
              - type: button
                name: Volume Down
                icon: mdi:volume-minus
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.cec_volume_down
              - type: button
                name: Mute
                icon: mdi:volume-mute
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.cec_mute
              - type: button
                name: Volume Up
                icon: mdi:volume-plus
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.cec_volume_up
      - type: vertical-stack
