                  target:
                    entity_id: script.cec_hdmi4
      - type: vertical-stack
        cards:
          - type: markdown
            content: '## 🕹️ Navigation'
          - type: horizontal-stack
            cards:
              - type: button
                name: ''
                icon: mdi:blank
                tap_action:
                  action: none
              - type: button
