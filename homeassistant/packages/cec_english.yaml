  cec_nav_ok:
    alias: "CEC - OK / Enter"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x00]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_nav_back:
    alias: "CEC - Back"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x0D]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_nav_home:
    alias: "CEC - Home"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x10]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_nav_menu:
    alias: "CEC - Menu"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x09]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_nav_info:
    alias: "CEC - Info"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x35]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  # ---------------------------------------------------------------------------
  # PLAYBACK (WIEDERGABE)
  # ---------------------------------------------------------------------------
  cec_play:
    alias: "CEC - Play"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x44]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_pause:
    alias: "CEC - Pause"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x46]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_stop:
    alias: "CEC - Stop"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x45]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_forward:
    alias: "CEC - Fast Forward"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x49]
      - action: script.cec_send
        data:
          destination: 0
