  cec_previous:
    alias: "CEC - Previous Track"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x4C]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  # ---------------------------------------------------------------------------
  # NUMERIC KEYS (ZAHLENTASTEN)
  # ---------------------------------------------------------------------------
  cec_key_0:
    alias: "CEC - Key 0"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x20]
      - action: script.cec_send
