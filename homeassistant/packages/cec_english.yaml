  cec_rewind:
    alias: "CEC - Rewind"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x48]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_next:
    alias: "CEC - Next Track"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x4B]
      - action: script.cec_send
        data:
