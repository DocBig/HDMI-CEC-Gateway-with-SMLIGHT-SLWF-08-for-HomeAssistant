# =============================================================================
# AUTOMATIONS
# =============================================================================
automation:

  # Condition checks the readable string for the decoded command name –
  # more reliable than raw[3:5], since it's independent of header format variations.

  - id: cec_tv_standby_detected
    alias: "CEC - TV entering Standby"
    # Trigger on text sensor instead of cec_rx event → reduces WiFi traffic from the ESP
    trigger:
      - platform: state
        entity_id: sensor.hdmi_cec_gateway_4dbde0_cec_readable  # ← adjust MAC suffix here!
    condition:
      - condition: template
        value_template: "{{ '<Standby>' in trigger.to_state.state }}"
    action:
      - service: persistent_notification.create
        data:
          title: "CEC"
          message: "TV entering standby"

  - id: cec_tv_on_detected
    alias: "CEC - TV turned on"
    # Trigger on text sensor instead of cec_rx event → reduces WiFi traffic from the ESP
    trigger:
      - platform: state
        entity_id: sensor.hdmi_cec_gateway_4dbde0_cec_readable  # ← adjust MAC suffix here!
    condition:
      - condition: template
        value_template: "{{ '<Image View On>' in trigger.to_state.state }}"
    action:
      - service: persistent_notification.create
        data:
          title: "CEC"
          message: "TV turned on"

  # ---------------------------------------------------------------------------
  # SCAN AUTOMATIONS
  # ---------------------------------------------------------------------------
  - id: cec_scan_reset
    alias: "CEC Scan - Reset"
    trigger:
      - platform: event
        event_type: esphome.cec_scan_started
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.cec_scan_results
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.cec_scan_status
        data:
          value: "Scanning... (0–14)"

  - id: cec_scan_collect
    alias: "CEC Scan - Device Found"
    trigger:
      - platform: event
        event_type: esphome.cec_scan_result
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.cec_scan_results
        data:
          value: >-
            {% set prev = states('input_text.cec_scan_results') %}
            {% set addr = trigger.event.data.logical_address %}
            {% set phys = trigger.event.data.physical_address %}
            {% set dtype = trigger.event.data.device_type %}
            {% set line = "Addr " ~ addr ~ " | " ~ phys ~ " | " ~ dtype %}
            {% if ("Addr " ~ addr ~ " |") in prev %}
              {{ prev }}
            {% elif prev != "" %}
              {{ prev + "\n" + line }}
            {% else %}
              {{ line }}
            {% endif %}

  - id: cec_scan_finished
    alias: "CEC Scan - Finished"
    trigger:
      - platform: event
        event_type: esphome.cec_scan_finished
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.cec_scan_status
        data:
          value: "Scan finished"
      - action: persistent_notification.create
        data:
          title: "CEC Scan"
          message: "{{ states('input_text.cec_scan_results') }}"

  # ---------------------------------------------------------------------------
  # BUS LOG
  # ---------------------------------------------------------------------------
  # sensor.cec_readable is updated on every message.
  # The Home Assistant logbook stores the full history automatically.
