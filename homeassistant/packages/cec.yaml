      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  # ---------------------------------------------------------------------------
  # WIEDERGABE
  # ---------------------------------------------------------------------------
  cec_play:
    alias: "CEC - Play"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x44]
      - action: script.cec_send
        data:
          destination: 0
