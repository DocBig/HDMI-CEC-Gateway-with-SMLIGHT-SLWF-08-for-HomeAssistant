    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x4C]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  # ---------------------------------------------------------------------------
  # ZAHLENTASTEN
  # ---------------------------------------------------------------------------
  cec_key_0:
    alias: "CEC - Taste 0"
    sequence:
      - action: script.cec_send
        data:
