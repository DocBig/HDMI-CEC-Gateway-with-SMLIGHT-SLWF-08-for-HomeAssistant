# =============================================================================
# AUTOMATIONS
# =============================================================================
automation:

  # Bedingung prüft den readable-String auf den dekodierten Befehlsnamen –
  # zuverlässiger als raw[3:5], da unabhängig von Header-Format-Variationen.

  - id: cec_tv_standby_detected
    alias: "CEC - TV geht in Standby"
    trigger:
      - platform: event
        event_type: esphome.cec_rx
    condition:
      - condition: template
        value_template: "{{ '<Standby>' in trigger.event.data.readable }}"
    action:
      - service: persistent_notification.create
        data:
          title: "CEC"
          message: "TV geht in Standby"

  - id: cec_tv_on_detected
    alias: "CEC - TV wurde eingeschaltet"
    trigger:
      - platform: event
        event_type: esphome.cec_rx
    condition:
      - condition: template
        value_template: "{{ '<Image View On>' in trigger.event.data.readable }}"
    action:
      - service: persistent_notification.create
        data:
          title: "CEC"
          message: "TV wurde eingeschaltet"

  # ---------------------------------------------------------------------------
  # SCAN-AUTOMATIONEN
  # ---------------------------------------------------------------------------
  - id: cec_scan_reset
    alias: "CEC Scan - Reset"
    trigger:
      - platform: event
        event_type: esphome.cec_scan_started
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.cec_scan_results
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.cec_scan_status
        data:
          value: "Scanning... (0–14)"

  - id: cec_scan_collect
    alias: "CEC Scan - Gerät gefunden"
    trigger:
      - platform: event
        event_type: esphome.cec_scan_result
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.cec_scan_results
        data:
          value: >-
            {% set prev = states('input_text.cec_scan_results') %}
            {% set addr = trigger.event.data.logical_address %}
            {% set phys = trigger.event.data.physical_address %}
            {% set dtype = trigger.event.data.device_type %}
            {% set line = "Addr " ~ addr ~ " | " ~ phys ~ " | " ~ dtype %}
            {% if ("Addr " ~ addr ~ " |") in prev %}
              {{ prev }}
            {% elif prev != "" %}
              {{ prev + "\n" + line }}
            {% else %}
              {{ line }}
            {% endif %}

  - id: cec_scan_finished
    alias: "CEC Scan - Abgeschlossen"
    trigger:
      - platform: event
        event_type: esphome.cec_scan_finished
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.cec_scan_status
        data:
          value: "Scan abgeschlossen"
      - action: persistent_notification.create
        data:
          title: "CEC Scan"
          message: "{{ states('input_text.cec_scan_results') }}"

  # ---------------------------------------------------------------------------
  # BUS-LOG
  # ---------------------------------------------------------------------------
  # sensor.cec_readable wird bei jeder Nachricht aktualisiert.
  # Das Logbook von HA speichert den gesamten Verlauf automatisch.
