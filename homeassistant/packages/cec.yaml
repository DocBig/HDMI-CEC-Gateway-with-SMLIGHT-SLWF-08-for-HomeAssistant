# =============================================================================
# packages/cec.yaml
# HDMI-CEC Gateway - Home Assistant Package
# =============================================================================
#
# Einbinden in configuration.yaml:
#   homeassistant:
#     packages:
#       cec: !include packages/cec.yaml
#
# Voraussetzung: hdmi-cec-gateway.yaml auf dem ESP geflasht
#
# EINMALIG ANPASSEN:
#   Den MAC-Suffix in allen Scripts anpassen.
#   Aktuell: esphome.hdmi_cec_gateway_4dbde0_cec_send
#   Den genauen Namen findest du unter:
#   HA - Entwicklerwerkzeuge - Aktionen - nach "esphome" suchen
#   Dann alle Vorkommen von "4dbde0" durch deinen MAC ersetzen.
#   Betrifft: script.cec_send, script.cec_scan_start
#
# CEC-Adressen:
#   0   = TV
#   3   = Tuner / Receiver (z.B. Sat-Receiver an HDMI 1)
#   4   = Playback Device (SLWF-08 selbst)
#   5   = Audio System (Soundbar)
#   15  = Broadcast (alle Geraete) = 0xF
#
# HDMI-Eingang - physische Adressen:
#   HDMI 1 = [0x10, 0x00]
#   HDMI 2 = [0x20, 0x00]
#   HDMI 3 = [0x30, 0x00]
#   HDMI 4 = [0x40, 0x00]
#
# Lautstaerke:
#   Philips (EasyLink): destination: 0  (direkt an TV)
#   Samsung (Anynet+):  destination: 15 (Broadcast)
#   TV-Modell ueber input_select.cec_tv_model auswaehlen,
#   Scripts cec_volume_up/down/mute passen sich automatisch an.
#
# Raw-Format der CEC-Events:
#   '(source<<4|dest):opcode:data...' z.B. '30:04'
#   Das Opcode-Byte liegt immer an raw[3:5].
#   Die Automationen prüfen nur den Opcode – funktioniert für jedes
#   Gerät an jedem HDMI-Port das die entsprechenden Befehle sendet.
#
# Geräte-Scan:
#   script.cec_scan_start startet einen sequenziellen Scan aller
#   logischen Adressen 0–14 (je 300 ms). Der ESP pingt jede Adresse
#   mit 0x83 (Give Physical Address). Antworten werden als Events
#   gesammelt und in input_text.cec_scan_results angezeigt.
#   Events:
#     esphome.cec_scan_started  – Scan gestartet (Reset der Liste)
#     esphome.cec_scan_result   – Gerät gefunden
#       Felder: logical_address, physical_address, device_type
#     esphome.cec_scan_finished – Alle 15 Adressen abgefragt
# =============================================================================

# =============================================================================
# ANPASSEN: Gateway HDMI-Port
# Wenn der SLWF-08 NICHT in HDMI 3 steckt, müssen die Inactive Source Adressen
# in den Scripts cec_hdmi1, cec_hdmi2, cec_hdmi4 angepasst werden:
#   HDMI 1: [0x9D, 0x10, 0x00]
#   HDMI 2: [0x9D, 0x20, 0x00]
#   HDMI 3: [0x9D, 0x30, 0x00]  ← Standard
#   HDMI 4: [0x9D, 0x40, 0x00]
# =============================================================================

# =============================================================================
# INPUT SELECT - TV-Modell auswählen (optional, für Lautstärke-Unterschied)
# =============================================================================
input_select:
  cec_tv_model:
    name: "CEC TV Modell"
    options:
      - Philips
      - Samsung
    initial: Philips
    icon: mdi:television

# =============================================================================
# INPUT BOOLEAN - Bus-Log
# =============================================================================
input_boolean:
  cec_bus_log_enabled:
    name: "CEC Bus-Log aktiv"
    icon: mdi:broadcast

# =============================================================================
# INPUT TEXT - Scan-Ergebnisse
# =============================================================================
input_text:
  cec_scan_results:
    name: "CEC Scan Ergebnisse"
    max: 255
    icon: mdi:format-list-bulleted
  cec_scan_status:
    name: "CEC Scan Status"
    max: 50
    icon: mdi:magnify

# =============================================================================
# SCRIPTS
# =============================================================================
script:

  # ---------------------------------------------------------------------------
  # HELPER: Einziger Ort wo der Service-Name steht → nur hier anpassen!
  # ---------------------------------------------------------------------------
  cec_send:
    alias: "CEC - Senden (intern)"
    mode: queued
    fields:
      destination:
        description: "CEC Zieladresse (0=TV, 15=Broadcast, ...)"
        example: "0"
      data:
        description: "CEC Daten als Liste"
        example: "[0x04]"
    sequence:
      - action: esphome.hdmi_cec_gateway_4dbde0_cec_send  # ← HIER MAC-Suffix anpassen!
        data:
          destination: "{{ destination }}"
          data: "{{ data }}"

  # ---------------------------------------------------------------------------
  # SCAN
  # ---------------------------------------------------------------------------
  cec_scan_start:
    alias: "CEC - Scan starten"
    sequence:
      - action: button.press
        target:
          entity_id: button.hdmi_cec_gateway_4dbde0_cec_scan  # ← MAC-Suffix anpassen!

  # ---------------------------------------------------------------------------
  # POWER
  # ---------------------------------------------------------------------------
  cec_tv_on:
    alias: "CEC - TV einschalten"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x04]          # Image View On

  cec_standby_all:
    alias: "CEC - Alles in Standby"
    sequence:
      - action: script.cec_send
        data:
          destination: 15
          data: [0x36]          # Standby Broadcast

  # ---------------------------------------------------------------------------
  # LAUTSTÄRKE - automatisch je nach gewähltem TV-Modell
  # Philips: direkt an TV (0), Samsung: Broadcast (15)
  # ---------------------------------------------------------------------------
  cec_volume_up:
    alias: "CEC - Lautstärke Hoch"
    sequence:
      - action: script.cec_send
        data:
          destination: >
            {% if is_state('input_select.cec_tv_model', 'Samsung') %}15{% else %}0{% endif %}
          data: [0x44, 0x41]
      - action: script.cec_send
        data:
          destination: >
            {% if is_state('input_select.cec_tv_model', 'Samsung') %}15{% else %}0{% endif %}
          data: [0x45]

  cec_volume_down:
    alias: "CEC - Lautstärke Runter"
    sequence:
      - action: script.cec_send
        data:
          destination: >
            {% if is_state('input_select.cec_tv_model', 'Samsung') %}15{% else %}0{% endif %}
          data: [0x44, 0x42]
      - action: script.cec_send
        data:
          destination: >
            {% if is_state('input_select.cec_tv_model', 'Samsung') %}15{% else %}0{% endif %}
          data: [0x45]

  cec_mute:
    alias: "CEC - Stummschalten"
    sequence:
      - action: script.cec_send
        data:
          destination: >
            {% if is_state('input_select.cec_tv_model', 'Samsung') %}15{% else %}0{% endif %}
          data: [0x44, 0x43]
      - action: script.cec_send
        data:
          destination: >
            {% if is_state('input_select.cec_tv_model', 'Samsung') %}15{% else %}0{% endif %}
          data: [0x45]

  # ---------------------------------------------------------------------------
  # HDMI-EINGANG WECHSELN (Philips + Samsung gleich)
  # Inactive Source vor Active Source verhindert Routing-Probleme
  # ---------------------------------------------------------------------------
  cec_hdmi1:
    alias: "CEC - HDMI 1 wählen"
    sequence:
      - action: script.cec_send
        data:
          destination: 15
          data: [0x9D, 0x30, 0x00]   # Inactive Source (Gateway in HDMI 3)
      - action: script.cec_send
        data:
          destination: 15
          data: [0x82, 0x10, 0x00]   # Active Source: HDMI 1

  cec_hdmi2:
    alias: "CEC - HDMI 2 wählen"
    sequence:
      - action: script.cec_send
        data:
          destination: 15
          data: [0x9D, 0x30, 0x00]
      - action: script.cec_send
        data:
          destination: 15
          data: [0x82, 0x20, 0x00]   # Active Source: HDMI 2

  cec_hdmi3:
    alias: "CEC - HDMI 3 wählen"
    sequence:
      - action: script.cec_send
        data:
          destination: 15
          data: [0x82, 0x30, 0x00]   # Active Source: HDMI 3 (kein Inactive nötig)

  cec_hdmi4:
    alias: "CEC - HDMI 4 wählen"
    sequence:
      - action: script.cec_send
        data:
          destination: 15
          data: [0x9D, 0x30, 0x00]
      - action: script.cec_send
        data:
          destination: 15
          data: [0x82, 0x40, 0x00]   # Active Source: HDMI 4

  # ---------------------------------------------------------------------------
  # NAVIGATION
  # ---------------------------------------------------------------------------
  cec_nav_up:
    alias: "CEC - Pfeil Hoch"
    sequence:
      - action: script.cec_send
        data:
          destination: 0
          data: [0x44, 0x01]
      - action: script.cec_send
        data:
          destination: 0
          data: [0x45]

  cec_nav_down:
    alias: "CEC - Pfeil Runter"
